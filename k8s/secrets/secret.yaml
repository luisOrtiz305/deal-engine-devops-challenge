# IMPORTANTE: Este archivo es un EJEMPLO de la estructura.
# Los valores reales NUNCA se comitean al repositorio.
#
# En un entorno real se usaría una de estas opciones:
#   Opción A (recomendada): AWS Secrets Manager + External Secrets Operator
#     → El operador sincroniza los secretos de AWS al cluster automáticamente
#   Opción B: kubectl create secret generic (comando manual en pipeline CI/CD)
#     → kubectl create secret generic backend-secrets \
#         --from-literal=db-password=$DB_PASSWORD \
#         --from-literal=api-secret-key=$API_SECRET_KEY \
#         --namespace=production
#
# Los valores de abajo son base64("PLACEHOLDER") — no son credenciales reales.
