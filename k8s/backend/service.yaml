apiVersion: v1
kind: Service
metadata:
  name: backend-api
  namespace: production
  labels:
    app: backend-api
spec:
  type: ClusterIP  # Solo accesible dentro del cluster, nunca expuesto directo a internet
  selector:
    app: backend-api
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
