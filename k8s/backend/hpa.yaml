apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-api-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend-api
  minReplicas: 3   # Mínimo 3 para alta disponibilidad (1 por AZ)
  maxReplicas: 10  # Suficiente para aguantar 2x tráfico pico (1000 req/seg)
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70  # Escala antes de saturarse, dejando margen
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60   # Espera 1 min antes de escalar hacia arriba
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60  # Máximo 2 pods nuevos por minuto (evita flapping)
    scaleDown:
      stabilizationWindowSeconds: 300  # Espera 5 min antes de escalar hacia abajo
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
