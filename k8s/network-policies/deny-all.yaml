# Política de default-deny: bloquea TODO el tráfico ingress y egress por defecto.
# Luego abrimos solo lo que explícitamente necesitamos.
# Esto es "principio de mínimo privilegio" aplicado a la red.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: production
spec:
  podSelector: {}   # Aplica a todos los pods del namespace
  policyTypes:
    - Ingress
    - Egress
